<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Scanner</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #000;
        color: #f5f7fb;
      }

      body {
        overflow-x: hidden;
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          #000;
        background-size: 44px 44px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .boot-panel {
        width: min(360px, calc(100vw - 48px));
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(12, 15, 20, 0.94);
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.48);
      }

      .boot-kicker {
        margin: 0 0 12px;
        color: #9aa5b5;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .boot-title {
        margin: 0;
        font-size: 24px;
        font-weight: 500;
        line-height: 1;
      }

      .boot-meter {
        position: relative;
        height: 4px;
        margin-top: 22px;
        overflow: hidden;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
      }

      .boot-meter::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 46%;
        background: #fff;
        animation: boot-scan 1.1s ease-in-out infinite;
      }

      @keyframes boot-scan {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(230%);
        }
      }
    </style>
  </head>
  <body class="bg-cyber-bg text-cyber-text antialiased">
    <div id="root">
      <div class="boot-screen" role="status" aria-live="polite" aria-label="应用正在启动">
        <div class="boot-panel">
          <p class="boot-kicker">Domain Scanner</p>
          <h1 class="boot-title">正在启动</h1>
          <div class="boot-meter" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
